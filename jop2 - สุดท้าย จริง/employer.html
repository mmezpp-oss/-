<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ข้อมูลส่วนตัวผู้ประกอบการ</title>
  <link rel="stylesheet" href="employer.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>

<body>

<div class="card">

  <h3>ข้อมูลส่วนตัวผู้ประกอบการ</h3>

  <form onsubmit="return false;">

    <!-- email (จำเป็นมาก เพราะ DB บังคับ not null) -->
    <label>Email  <span class="required">*</span></label>
    <input type="email" id="email"  required>

    <!-- ชื่อ - สกุล -->
    <label>ชื่อ-สกุล <span class="required">*</span></label>
    <div class="two-col">
      <input type="text" id="full_name" required>
    </div>

    <!-- รูปบัตรประชาชน -->
    <label>รูปบัตรประจำตัวประชาชน <span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
    <input type="file" id="img_card" accept="image/*">

    <!-- เลขบัตร -->
    <label>เลขบัตรประจำตัวประชาชน <span class="required">*</span></label>
    <input type="text" id="register" maxlength="13">

    <!-- ตำแหน่งร้าน -->
    <label>ตำแหน่งที่ตั้งร้าน <span class="required">*</span></label>
    <div class="location-row">

      <select id="location">
        <option value="">เลือกจุดตั้งร้าน</option>
        <option value="ในห้าง">ในห้าง</option>
        <option value="นอกห้าง">นอกห้าง</option>
      </select>
    </div>
    <label>ที่อยู่ร้าน(เลือกจากแผนที่)<span class="required">*</span></label>
    <input
            type="text"
            id="address"
            placeholder="กดเพื่อเลือกตำแหน่ง"
            readonly
            onclick="goMap()"
    />

    <input type="hidden" id="latitude">
    <input type="hidden" id="longitude">
    <input type="hidden" id="point">

    <!-- เบอร์ -->
    <label>เบอร์โทรศัพท์ <span class="required">*</span></label>
    <input type="tel" id="phone" maxlength="10">

    <!-- ชื่อร้าน -->
    <label>ชื่อร้าน <span class="required">*</span></label>
    <input type="text" id="shop" >

    <!-- รูปต่าง ๆ (ยังไม่อัปโหลด แค่เตรียมช่องไว้) -->
    <label>แนบรูปบริษัทหรือหน้าร้าน <span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
    <input type="file" id="img_shop" accept="image/*">

    <label>แนบรูปผู้ประกอบการ
      (โปรดแสดงให้เห็นหน้าชัดเจน) <span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
    <input type="file" id="img_owner" accept="image/*">

    <label>แนบรูปใบจดทะเบียนร้าน <span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
    <input type="file" id="img_RC" accept="image/*">

    <!-- ปุ่ม -->
    <div class="btn-group">
      <button
              type="button"
              class="submit-btn"
              onclick="submitEmployer()">
        ส่งข้อมูล
      </button>
      <button
              type="button"
              class="cancel"
              onclick="history.back()">
        ยกเลิก
      </button>
    </div>

  </form>

</div>

<script src="employer.js"></script>
</body>
</html>
