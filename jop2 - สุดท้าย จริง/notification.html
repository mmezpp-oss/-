<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>การแจ้งเตือน</title>
    <link rel="stylesheet" href="employer-jobs.css">
    <link rel="stylesheet" href="notification.css">
    <style>

        body{
            margin:0;
            font-family:sarabun;
            background:#eee;
        }

        .header{
            text-align:center;
            padding:10px;
            border-bottom:3px solid black;
            font-weight:bold;
        }

        .item{
            display:flex;
            align-items:center;
            padding:20px;
        }

        .item img{
            width:120px;
            height:120px;
            border:2px solid black;
            border-radius:25px;
            object-fit:cover;
        }

        .info{
            margin-left:20px;
        }

        .detail{
            color:red;
            margin-top:10px;
        }

        .empty{
            width:120px;
            height:120px;
            border:2px solid black;
            border-radius:25px;
            margin:20px;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            width:100%;
            height:60px;
            background:black;
            display:flex;
            justify-content:space-around;
            align-items:center;
        }

        .nav-item{
            color:white;
            font-size:22px;
        }

    </style>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="header">
    การแจ้งเตือน
</div>
<div id="jobStatus"></div>
<div class="bottom-nav">

    <div class="nav-item" onclick="goHome()">
        <i class="fa fa-home"></i>
    </div>

    <div class="nav-item active" onclick="goNotification()">
        <i class="fa fa-bell"></i>
    </div>

    <div class="nav-item" onclick="window.location.href='seeker-profile.html'">
        <i class="fa fa-user"></i>
    </div>
    </div>

</div>
<script>

    function goHome(){
        window.location.href = "jobs.html";
    }

    function goNotification(){
        window.location.href = "notification.html";
    }

    function goProfile(){
        window.location.href = "profile.html";
    }

</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="notification.js"></script>

</body>
</html>
