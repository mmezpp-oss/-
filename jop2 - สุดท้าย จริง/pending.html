<!DOCTYPE html>
<html lang="th">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="pending.js"></script>

    <meta charset="UTF-8">
    <title>รอการอนุมัติ</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #fff;
            width: 360px;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .icon span {
            font-size: 40px;
            color: orange;
        }

        h3 {
            color: orange;
            margin-top: 20px;
        }

        p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        .back {
            margin-top: 25px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">
        <span>🕒</span>
    </div>

    <h3>รอการอนุมัติ</h3>

    <p>
        ข้อมูลของคุณถูกส่งเรียบร้อยแล้ว<br>
        กรุณารอการอนุมัติจากผู้ดูแลระบบ
    </p>


    </div>
</div>

</body>
</html>
