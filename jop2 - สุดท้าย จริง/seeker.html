<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อมูลส่วนตัวผู้หางาน</title>
    <link rel="stylesheet" href="seeker.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>

<body>

<div class="card">

    <h3>ข้อมูลส่วนตัวผู้หางาน</h3>

    <form id="seekerForm">

        <label>อีเมล <span class="required">*</span></label>
        <input type="email" id="email" required>

        <label>ชื่อ-สกุล <span class="required">*</span></label>
        <input type="text" id="full_name" required>

        <label>รูปบัตรประจำตัวประชาชน<span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
        <input type="file" id="img_card" accept="image/*">

        <label>เลขบัตรประจำตัวประชาชน <span class="required">*</span></label>
        <input type="text" id="idcard" maxlength="13">

        <label>ที่อยู่ปัจจุบัน<span class="required">*</span></label>
        <input
                type="text"
                id="address"
                placeholder="กดเพื่อเลือกตำแหน่ง"
                readonly
                onclick="goMap()"
        />

        <label>เบอร์โทรศัพท์ <span class="required">*</span></label>
        <input type="tel" id="phone" maxlength="10" >

        <label>สถานศึกษา <span class="required">*</span></label>
        <select id="school">
            <option value="">เลือกสถานศึกษา</option>
            <option value="มหาวิทยาลัยราชภัฏพิบูลสงคราม">มหาวิทยาลัยราชภัฏพิบูลสงคราม</option>
            <option value="มหาวิทยาลัยนเรศวร">มหาวิทยาลัยนเรศวร</option>
            <option value="มหาวิทยาลัยเทคโนโลยีราชมงคลล้านนา (พิษณุโลก)">มหาวิทยาลัยเทคโนโลยีราชมงคลล้านนา (พิษณุโลก)</option>
            <option value="มหาวิทยาลัยพิษณุโลก">มหาวิทยาลัยพิษณุโลก</option>
            <option value="อวิทยาลัยเทคนิคพิษณุโลก">วิทยาลัยเทคนิคพิษณุโลก</option>
            <option value="วิทยาลัยอาชีวศึกษาพิษณุโลก">วิทยาลัยอาชีวศึกษาพิษณุโลก</option>
            <option value="อวิทยาลัยพณิชยการบึงพระพิษณุโลก">วิทยาลัยพณิชยการบึงพระพิษณุโลก</option>
            <option value="วิทยาลัยสารพัดช่างพิษณุโลก">อวิทยาลัยสารพัดช่างพิษณุโลก</option>
        </select>

        <label>วัน/เดือน/ปีเกิด <span class="required">*</span></label>
        <input type="date" id="birthdate" onchange="calcAge()" required>


        <div class="age">อายุ : <span id="age">-</span></div>

        <label>ประสบการณ์ <span class="required">*</span></label>
        <input type="text" id="exp">

        <label>เพศ <span class="required">*</span></label>
        <select id="gender">
            <option value="">เลือกเพศ</option>
            <option value="ชาย">ชาย</option>
            <option value="หญิง">หญิง</option>
            <option value="อื่นๆ">อื่นๆ</option>
        </select>

        <label>แนบรูปบัตรนักศึกษา<span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
        <input type="file" id="img_profile" accept="image/*">

        <label>แนบรูปยืนยันตัวตน(โปรดแสดงให้เห็นหน้าชัดเจน)<span class="required">*กรุณาเลือกแผนที่ก่อนค่ะ*</span></label>
        <input type="file" id="img_face" accept="image/*">

        <div class="btn-group">
            <button type="submit" class="submit">ส่งข้อมูล</button>
            <button type="button" class="cancel" onclick="history.back()">ยกเลิก</button>
        </div>

    </form>

</div>

<script src="seeker.js"></script>
</body>
</html>
